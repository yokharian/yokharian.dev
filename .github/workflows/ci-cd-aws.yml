name: CI & Deploy to aws

on:
  push:
    branches: [ portfolio/master, portfolio/development ]
  pull_request:
    branches: [ portfolio/master, portfolio/development ]
  workflow_dispatch:
    inputs:
      reason:
        description: "Optional note for the deploy log"
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run every test suite
        run: npm run test

  deploy:
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: ${{ github.ref_name }}
    name: Deploy with Amplify CLI
    runs-on: ubuntu-latest
    env:
      DEPLOY_BRANCH: ${{ github.ref_name }}
      AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
      CI: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Deploy backend with Amplify CLI
        env:
          DEPLOY_BRANCH: ${{ env.DEPLOY_BRANCH }}
          AMPLIFY_APP_ID: ${{ env.AMPLIFY_APP_ID }}
        run: |
          if [ -z "$AMPLIFY_APP_ID" ]; then
            echo "Missing AMPLIFY_APP_ID secret." >&2
            exit 1
          fi

          branch="$DEPLOY_BRANCH"
          if [ -z "$branch" ]; then
            echo "Unable to detect branch; set workflow input or ensure push event." >&2
            exit 1
          fi

          echo "Deploying Amplify app $AMPLIFY_APP_ID (branch: $branch)."
          npx ampx pipeline-deploy --branch "$branch" --app-id "$AMPLIFY_APP_ID"

      - name: Trigger Amplify frontend build (main only)
        env:
          BRANCH_NAME: ${{ env.DEPLOY_BRANCH }}
          AMPLIFY_WEBHOOK_URL: ${{ secrets.AMPLIFY_WEBHOOK_URL }}
        run: |
          if [ -z "$AMPLIFY_WEBHOOK_URL" ]; then
            echo "Missing AMPLIFY_WEBHOOK_URL secret." >&2
            exit 1
          fi
          echo "Triggering Amplify frontend build via webhook for branch $BRANCH_NAME..."
          curl -sS -X POST -d '{}' "$AMPLIFY_WEBHOOK_URL" -H "Content-Type:application/json"
